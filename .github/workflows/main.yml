name: Build and Deploy API Jogos to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: acrfiaplabnet
  WEBAPP_NAME: api-jogos
  RESOURCE_GROUP: rg-fiap-lab
  IMAGE_NAME: apijogos

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PRD }}

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            ./apijogos

      - name: Push Docker image
        run: |
          docker push \
            $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
